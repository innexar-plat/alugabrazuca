name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        required: true
        type: choice
        options:
          - staging
          - production
  push:
    branches:
      - develop  # auto-deploy para staging
      - main     # auto-deploy para produção

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 1. Quality gate — roda antes de qualquer deploy
  # ---------------------------------------------------------------------------
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test:coverage

  # ---------------------------------------------------------------------------
  # 2. Build Docker images
  # ---------------------------------------------------------------------------
  build:
    name: Build Images
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        run: |
          docker build -t alugabrazuca-web:${{ github.sha }} -f apps/web/Dockerfile .

      - name: Build api image
        run: |
          docker build -t alugabrazuca-api:${{ github.sha }} -f apps/api/Dockerfile .

      - name: Save images
        run: |
          docker save alugabrazuca-web:${{ github.sha }} | gzip > web.tar.gz
          docker save alugabrazuca-api:${{ github.sha }} | gzip > api.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            web.tar.gz
            api.tar.gz
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 3. Deploy para staging (branch develop)
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy Staging
    needs: build
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/alugabrazuca
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate web api
            docker system prune -f

  # ---------------------------------------------------------------------------
  # 4. Deploy para produção (branch main)
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy Production
    needs: build
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/brasilquartos
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate web api
            docker compose -f docker-compose.prod.yml exec api npx prisma migrate deploy
            docker system prune -f

      - name: Healthcheck
        run: |
          sleep 15
          curl --fail --retry 5 --retry-delay 5 ${{ secrets.PRODUCTION_URL }}/api/health || exit 1
